<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 상세</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page">
    <header class="page-header">
        <div>
            <p class="eyebrow">Counselor UI</p>
            <h1 th:text="${detail.inquiry.title}">문의 상세</h1>
            <p class="muted">
                <span th:text="${detail.inquiry.customerIdentifier}">cust-1</span>
                <span class="dot">•</span>
                <span th:text="${detail.inquiry.status}">NEW</span>
            </p>
        </div>
        <a class="button secondary" href="/ui/inquiries">목록</a>
    </header>

    <section class="panel stack">
        <div class="summary-grid">
            <div><span class="label">카테고리</span><strong th:text="${detail.inquiry.category}">REFUND</strong></div>
            <div><span class="label">긴급도</span><strong th:text="${detail.inquiry.urgency}">HIGH</strong></div>
            <div><span class="label">생성일</span><strong th:text="${#temporals.format(detail.inquiry.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-08 09:00</strong></div>
            <div><span class="label">수정일</span><strong th:text="${#temporals.format(detail.inquiry.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-04-08 09:00</strong></div>
        </div>

        <article class="card">
            <h2>문의 내용</h2>
            <p th:text="${detail.inquiry.content}">문의 내용</p>
        </article>

        <article class="card">
            <h2>AI 자동 답변</h2>
            <div id="analyze-section">
                <div id="analyze-status" style="margin-bottom:12px;">
                    <span th:if="${detail.inquiry.aiDraftAnswer == null}" class="muted">아직 AI 분석이 실행되지 않았습니다.</span>
                </div>
                <div id="draft-box" th:if="${detail.inquiry.aiDraftAnswer != null}">
                    <textarea id="draft-answer" rows="8" style="width:100%;font-size:14px;padding:10px;border:1px solid #ddd;border-radius:6px;resize:vertical;font-family:inherit;" th:text="${detail.inquiry.aiDraftAnswer}"></textarea>
                    <button type="button" onclick="copyDraft()" style="margin-top:8px;" class="button secondary">답변 복사</button>
                </div>
            </div>
        </article>

        <article class="card">
            <h2>참고 문서</h2>
            <p class="muted" style="font-size:13px;margin-bottom:12px;">AI가 답변 생성 시 참고한 정책 문서입니다.</p>
            <div id="ref-docs-section">
                <div th:if="${#lists.isEmpty(detail.evidenceChunks)}" class="muted" id="ref-docs-empty">AI 분석 실행 후 참고한 정책 문서가 표시됩니다.</div>
                <div th:each="chunk : ${detail.evidenceChunks}" class="chunk" th:attr="data-doc-id=${chunk.manualDocumentId}">
                    <div class="chunk-meta">
                        <strong th:text="${chunk.manualDocumentTitle}">정책 문서</strong>
                        <span class="label" th:text="${chunk.manualCategory}">REFUND</span>
                        <a th:href="@{/ui/manuals/{id}(id=${chunk.manualDocumentId})}" style="font-size:12px;margin-left:auto;">문서 보기 →</a>
                    </div>
                    <p th:text="${chunk.content}" style="font-size:13px;color:#555;margin-top:6px;">내용</p>
                </div>
            </div>
        </article>

        <article class="card">
            <h2>상담사 작업</h2>
            <div class="actions">
                <button id="analyze-btn" class="button" type="button" onclick="runAnalyze()">AI 자동 답변 만들기</button>
                <form th:action="@{/api/inquiries/{id}/review(id=${detail.inquiry.id})}" method="post">
                    <input type="hidden" name="finalAnswer" th:value="${detail.inquiry.aiDraftAnswer}">
                    <input type="hidden" name="reviewMemo" th:value="${detail.inquiry.reviewMemo}">
                    <input type="hidden" name="reviewedBy" value="counselor-demo">
                    <button class="button secondary" type="submit">최종 확정</button>
                </form>
                <form th:action="@{/api/inquiries/{id}/close(id=${detail.inquiry.id})}" method="post">
                    <button class="button ghost" type="submit">종료</button>
                </form>
            </div>
        </article>
    </section>
</main>

<script th:inline="javascript">
    const inquiryId = [[${detail.inquiry.id}]];

    async function runAnalyze() {
        const btn = document.getElementById('analyze-btn');
        const status = document.getElementById('analyze-status');

        btn.disabled = true;
        btn.textContent = 'AI 분석 중...';
        status.innerHTML = '<span class="muted">GPT가 메뉴얼을 검색하고 답변을 생성하고 있습니다...</span>';

        try {
            const res = await fetch(`/api/inquiries/${inquiryId}/analyze`, { method: 'POST' });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `분석 실패 (${res.status})`);
            }
            const data = await res.json();

            status.innerHTML = '';
            const draftBox = document.getElementById('draft-box') || createDraftBox();
            const textarea = document.getElementById('draft-answer');
            textarea.value = data.draft?.answer ?? '';
            btn.textContent = '다시 분석';
            btn.disabled = false;

            renderRoutingResult(data);
            renderRefDocs(data.retrievedChunks ?? []);
        } catch (e) {
            status.innerHTML = `<span style="color:red">오류: ${e.message}</span>`;
            btn.textContent = 'AI 자동 답변 만들기';
            btn.disabled = false;
        }
    }

    function createDraftBox() {
        const section = document.getElementById('analyze-section');
        const div = document.createElement('div');
        div.id = 'draft-box';
        div.innerHTML = `
            <textarea id="draft-answer" rows="8" style="width:100%;font-size:14px;padding:10px;border:1px solid #ddd;border-radius:6px;resize:vertical;font-family:inherit;"></textarea>
            <button type="button" onclick="copyDraft()" style="margin-top:8px;" class="button secondary">답변 복사</button>
        `;
        section.appendChild(div);
        return div;
    }

    function renderRoutingResult(data) {
        const existing = document.getElementById('routing-result');
        if (existing) existing.remove();

        const div = document.createElement('div');
        div.id = 'routing-result';
        div.style.cssText = 'margin-top:12px;padding:10px 14px;border-radius:6px;font-size:14px;';

        if (data.autoProcessed) {
            div.style.background = '#e8f5e9';
            div.style.color = '#2e7d32';
            div.innerHTML = '✓ <strong>자동 처리 완료</strong> — AI 신뢰도가 충분하여 답변이 자동 확정되었습니다.';
        } else if (data.needsEscalation) {
            div.style.background = '#fce4ec';
            div.style.color = '#b71c1c';
            div.innerHTML = '⚠ <strong>에스컬레이션 필요</strong> — 담당 매니저 확인이 필요합니다. 알림이 전송되었습니다.';
        } else {
            div.style.background = '#fff3e0';
            div.style.color = '#e65100';
            div.innerHTML = '👤 <strong>검토 필요</strong> — AI가 사람의 확인이 필요하다고 판단했습니다. 내용을 검토 후 확정해 주세요.';
        }

        document.getElementById('analyze-section').appendChild(div);
    }

    function renderRefDocs(chunks) {
        const section = document.getElementById('ref-docs-section');
        if (!chunks.length) return;

        const seen = new Set();
        const unique = chunks.filter(c => {
            if (seen.has(c.manualDocumentId)) return false;
            seen.add(c.manualDocumentId);
            return true;
        });

        section.innerHTML = unique.map(c => `
            <div class="chunk">
                <div class="chunk-meta">
                    <strong>${c.manualDocumentTitle}</strong>
                    <span class="label">${c.manualCategory}</span>
                    <a href="/ui/manuals/${c.manualDocumentId}" style="font-size:12px;margin-left:auto;">문서 보기 →</a>
                </div>
                <p style="font-size:13px;color:#555;margin-top:6px;">${c.content}</p>
            </div>
        `).join('');
    }

    function copyDraft() {
        const textarea = document.getElementById('draft-answer');
        textarea.select();
        navigator.clipboard.writeText(textarea.value).then(() => {
            const btn = event.target;
            btn.textContent = '복사됨!';
            setTimeout(() => btn.textContent = '답변 복사', 1500);
        });
    }
</script>
</body>
</html>
