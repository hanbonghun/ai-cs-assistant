<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 목록</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<div th:insert="~{fragments/topnav :: topnav('admin')}"></div>
<main class="page" style="margin-top: 52px;">
    <header class="page-header">
        <div>
            <p class="eyebrow">Counselor UI</p>
            <h1>문의 목록</h1>
            <p class="muted">상담사 검토용 데모 화면입니다.</p>
        </div>
        <div style="display:flex;gap:8px;">
            <a class="button secondary" href="/ui/manuals">정책 문서 관리</a>
            <a class="button" href="/ui/inquiries/new">문의 등록</a>
        </div>
    </header>

    <section class="panel">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>제목</th>
                <th>고객</th>
                <th>카테고리</th>
                <th>긴급도</th>
                <th>상태</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="inquiry : ${inquiries}">
                <td th:text="${inquiry.id}">1</td>
                <td><a th:href="@{/ui/inquiries/{id}(id=${inquiry.id})}" th:text="${inquiry.title}">문의 제목</a></td>
                <td th:text="${inquiry.customerIdentifier}">cust-1</td>
                <td th:text="${inquiry.category}">REFUND</td>
                <td th:text="${inquiry.urgency}">HIGH</td>
                <td>
                    <span th:switch="${inquiry.status.name()}">
                        <span th:case="'NEW'" style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:12px;">신규</span>
                        <span th:case="'AI_PROCESSED'" style="background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:4px;font-size:12px;">검토 필요</span>
                        <span th:case="'AUTO_ANSWERED'" style="background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:4px;font-size:12px;">자동 처리됨</span>
                        <span th:case="'REVIEWED'" style="background:#f3e5f5;color:#6a1b9a;padding:2px 8px;border-radius:4px;font-size:12px;">검토 완료</span>
                        <span th:case="'CLOSED'" style="background:#f5f5f5;color:#757575;padding:2px 8px;border-radius:4px;font-size:12px;">종료</span>
                        <span th:case="*" th:text="${inquiry.status}"></span>
                    </span>
                </td>
                <td><a th:href="@{/ui/inquiries/{id}(id=${inquiry.id})}">상세</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(inquiries)}">
                <td colspan="7" class="muted">등록된 문의가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
