<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 목록</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<div th:insert="~{fragments/topnav :: topnav('admin')}"></div>
<main class="page" style="margin-top: 52px;">
    <header class="page-header">
        <div>
            <p class="eyebrow">Counselor UI</p>
            <h1>문의 목록</h1>
            <p class="muted">상담사 검토용 데모 화면입니다.</p>
        </div>
        <div style="display:flex;gap:8px;">
            <a class="button secondary" href="/ui/manuals">정책 문서 관리</a>
        </div>
    </header>

    <section class="panel">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>제목</th>
                <th>고객</th>
                <th>카테고리</th>
                <th>긴급도</th>
                <th>상태</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="inquiry : ${inquiries}"
                th:onclick="|location.href='@{/ui/inquiries/{id}(id=${inquiry.id})}'|"
                style="cursor:pointer;">
                <td th:text="${inquiry.id}">1</td>
                <td th:text="${inquiry.title}">문의 제목</td>
                <td th:text="${#strings.replace(inquiry.customerIdentifier, 'cust-', '고객 #')}">고객 #001</td>
                <td th:text="${categoryLabels[inquiry.category.name()] ?: inquiry.category.name()}">반품</td>
                <td th:text="${urgencyLabels[inquiry.urgency.name()] ?: inquiry.urgency.name()}">높음</td>
                <td>
                    <span th:switch="${inquiry.status.name()}">
                        <span th:case="'NEW'" style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:12px;">접수됨</span>
                        <span th:case="'PENDING_CUSTOMER'" style="background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:4px;font-size:12px;">추가 정보 요청</span>
                        <span th:case="'AI_PROCESSED'" style="background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;font-size:12px;">검토 필요</span>
                        <span th:case="'AUTO_ANSWERED'" style="background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:4px;font-size:12px;">자동 처리 완료</span>
                        <span th:case="'REVIEWED'" style="background:#f3e5f5;color:#6a1b9a;padding:2px 8px;border-radius:4px;font-size:12px;">상담사 검토 완료</span>
                        <span th:case="'CLOSED'" style="background:#f5f5f5;color:#757575;padding:2px 8px;border-radius:4px;font-size:12px;">종료</span>
                        <span th:case="*" th:text="${inquiry.status}"></span>
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(inquiries)}">
                <td colspan="6" class="muted">등록된 문의가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
