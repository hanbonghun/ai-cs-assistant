<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="topnav(mode)" style="
    position:fixed;top:0;left:0;right:0;z-index:1000;
    height:36px;background:#111;color:#fff;
    display:flex;align-items:center;padding:0 20px;gap:12px;
    font-size:12px;font-family:inherit;">

    <span style="font-weight:700;letter-spacing:.5px;color:#fff;margin-right:4px;">CS Assistant</span>
    <span style="color:#555;">|</span>

    <a th:href="@{/app}"
       th:style="${mode == 'user'} ? 'color:#fff;font-weight:600;background:#1976d2;padding:3px 10px;border-radius:4px;text-decoration:none;' : 'color:#888;text-decoration:none;padding:3px 10px;'"
       style="text-decoration:none;">유저 화면</a>

    <a th:href="@{/ui/inquiries}"
       th:style="${mode == 'admin'} ? 'color:#fff;font-weight:600;background:#1976d2;padding:3px 10px;border-radius:4px;text-decoration:none;' : 'color:#888;text-decoration:none;padding:3px 10px;'"
       style="text-decoration:none;">어드민</a>
</div>
</body>
</html>
