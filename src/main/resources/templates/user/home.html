<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 센터 - 홈</title>
    <link rel="stylesheet" href="/app.css">
    <style>
        .profile-bar { display: flex; align-items: center; gap: 14px; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; }
        .profile-avatar { width: 44px; height: 44px; border-radius: 50%; background: #e3f2fd; color: #1976d2; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .profile-info .name { font-weight: 600; font-size: 15px; }
        .profile-info .sub { font-size: 12px; color: #888; margin-top: 2px; }
        .profile-bar form { margin-left: auto; }

        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

        .order-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
        .order-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
        .order-icon { width: 36px; height: 36px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .order-body { flex: 1; min-width: 0; }
        .order-body .product { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .order-body .meta { font-size: 12px; color: #888; margin-top: 3px; }
        .order-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
        .badge-green { background: #e8f5e9; color: #2e7d32; }
        .badge-orange { background: #fff3e0; color: #e65100; }
        .badge-red { background: #fce4ec; color: #c62828; }
        .badge-gray { background: #f5f5f5; color: #616161; }

        .inquiry-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .inquiry-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e0e0e0; color: #888; font-weight: 500; }
        .inquiry-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .inquiry-table tr:hover td { background: #fafafa; }
        .inquiry-table a { color: inherit; text-decoration: none; }
        .inquiry-table a:hover { color: #1976d2; }
        .empty-state { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
<div th:insert="~{fragments/topnav :: topnav('user')}"></div>
<main class="page" style="max-width: 780px; margin-top: 52px;">
    <header class="page-header" style="margin-bottom: 20px;">
        <div>
            <p class="eyebrow">고객 센터</p>
            <h1>안녕하세요, <span th:text="${user.name}">김민준</span>님</h1>
        </div>
        <a class="button secondary" href="/app/inquiries/new">문의하기</a>
    </header>

    <!-- 프로필 -->
    <div class="profile-bar">
        <div class="profile-avatar" th:text="${#strings.substring(user.name, 0, 1)}">김</div>
        <div class="profile-info">
            <div class="name" th:text="${user.name}">김민준</div>
            <div class="sub" th:text="${user.email + ' · ' + user.phone}">email</div>
        </div>
        <form th:action="@{/app/logout}" method="post" style="margin:0;">
            <button type="submit" class="button ghost" style="font-size:13px;padding:6px 12px;">로그아웃</button>
        </form>
    </div>

    <!-- 내 주문 -->
    <div>
        <div class="section-title">내 주문</div>
        <div class="order-list">
            <div th:each="order : ${user.orders}" class="order-item">
                <div class="order-icon">📦</div>
                <div class="order-body">
                    <div class="product" th:text="${order.productName}">상품명</div>
                    <div class="meta">
                        <span th:text="${order.orderId}">ORD-...</span>
                        <span style="margin: 0 4px;">·</span>
                        <span th:text="${order.orderedAt}">2026-04-10</span>
                    </div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                    <div class="order-amount" th:text="${#numbers.formatInteger(order.amount, 0, 'COMMA') + '원'}">89,000원</div>
                    <span th:classappend="${order.status == '배송중' or order.status == '배송준비중'} ? 'badge-blue' :
                                         (${order.status == '배송완료' or order.status == '부분환불완료'} ? 'badge-green' :
                                         (${order.status == '취소처리중' or order.status == '교환진행중'} ? 'badge-orange' :
                                         (${order.status == '결제완료'} ? 'badge-gray' : 'badge-gray')))"
                          class="status-badge"
                          th:text="${order.status}">배송중</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 내 문의 내역 -->
    <div>
        <div class="section-title" style="margin-top: 8px;">내 문의 내역</div>
        <div th:if="${#lists.isEmpty(myInquiries)}" class="empty-state">
            아직 접수한 문의가 없습니다.<br>
            <a href="/app/inquiries/new" style="color:#1976d2;margin-top:8px;display:inline-block;">첫 문의 남기기 →</a>
        </div>
        <table th:if="${!#lists.isEmpty(myInquiries)}" class="inquiry-table">
            <thead>
                <tr>
                    <th>제목</th>
                    <th>카테고리</th>
                    <th>상태</th>
                    <th>접수일</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inq : ${myInquiries}">
                    <td><a th:href="@{/app/inquiries/{id}(id=${inq.id})}" th:text="${inq.title}">제목</a></td>
                    <td th:text="${inq.category != null ? inq.category.name() : '-'}">-</td>
                    <td>
                        <span th:with="s=${inq.status.name()}"
                              th:classappend="${(s == 'NEW' or s == 'PENDING_CUSTOMER') ? 'badge-orange' :
                                             ((s == 'AUTO_ANSWERED' or s == 'REVIEWED') ? 'badge-green' :
                                             (s == 'CLOSED' ? 'badge-gray' : 'badge-blue'))}"
                              class="status-badge"
                              th:text="${s == 'NEW' ? '접수됨' :
                                       (s == 'PENDING_CUSTOMER' ? '추가 정보 요청' :
                                       (s == 'AI_PROCESSED' ? '검토 중' :
                                       (s == 'AUTO_ANSWERED' ? '답변 완료' :
                                       (s == 'REVIEWED' ? '답변 완료' :
                                       (s == 'CLOSED' ? '종료' : s)))))}">상태</span>
                    </td>
                    <td th:text="${#temporals.format(inq.createdAt, 'MM-dd HH:mm')}">04-10</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
