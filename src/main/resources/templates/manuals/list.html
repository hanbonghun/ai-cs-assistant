<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매뉴얼 목록</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page">
    <header class="page-header">
        <div>
            <p class="eyebrow">Counselor UI</p>
            <h1>매뉴얼 목록</h1>
            <p class="muted">상담 기준 문서를 빠르게 확인하고 추가하는 화면입니다.</p>
        </div>
        <a class="button secondary" href="/ui/inquiries">문의로 이동</a>
    </header>

    <section class="panel stack">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;">

            <form class="form compact" id="upload-form" action="/api/manual-documents/upload" method="post" enctype="multipart/form-data">
                <h2>📄 파일 업로드 (PDF / TXT / MD)</h2>
                <p class="muted" style="font-size:13px;margin-bottom:12px;">파일을 업로드하면 자동으로 청크 분할 및 임베딩이 생성됩니다.</p>
                <div class="grid-two">
                    <label>
                        제목
                        <input type="text" name="title" placeholder="환불 정책 v2" required>
                    </label>
                    <label>
                        카테고리
                        <select name="category">
                            <option th:each="category : ${categories}" th:value="${category}" th:text="${category}">REFUND</option>
                        </select>
                    </label>
                </div>
                <label>
                    파일 선택
                    <input type="file" name="file" accept=".pdf,.txt,.md" required style="margin-top:6px;">
                </label>
                <div id="upload-status" style="display:none;margin-top:8px;font-size:13px;"></div>
                <div class="actions">
                    <button class="button" type="button" onclick="submitUpload()">업로드 및 임베딩 생성</button>
                </div>
            </form>

            <form class="form compact" action="/api/manual-documents" method="post">
                <h2>✏️ 직접 입력</h2>
                <p class="muted" style="font-size:13px;margin-bottom:12px;">텍스트를 직접 입력하여 등록합니다.</p>
                <div class="grid-two">
                    <label>
                        제목
                        <input type="text" name="title" placeholder="환불 정책" required>
                    </label>
                    <label>
                        카테고리
                        <select name="category">
                            <option th:each="category : ${categories}" th:value="${category}" th:text="${category}">REFUND</option>
                        </select>
                    </label>
                </div>
                <label>
                    내용
                    <textarea name="content" rows="6" placeholder="매뉴얼 내용을 입력하세요." required></textarea>
                </label>
                <div class="actions">
                    <button class="button secondary" type="submit">등록</button>
                </div>
            </form>

        </div>

        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>제목</th>
                <th>카테고리</th>
                <th>버전</th>
                <th>상태</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="manual : ${manuals}">
                <td th:text="${manual.id}">1</td>
                <td th:text="${manual.title}">환불 정책</td>
                <td th:text="${manual.category}">REFUND</td>
                <td th:text="${manual.version}">1</td>
                <td th:text="${manual.active ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</td>
                <td><a th:href="@{/ui/manuals/{id}(id=${manual.id})}">상세</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(manuals)}">
                <td colspan="6" class="muted">등록된 매뉴얼이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<script>
    async function submitUpload() {
        const form = document.getElementById('upload-form');
        const status = document.getElementById('upload-status');
        const btn = form.querySelector('button[type="button"]');
        const formData = new FormData(form);

        status.style.display = 'block';
        status.style.color = '#666';
        status.textContent = '파일 업로드 중... 임베딩 생성에 수십 초가 소요될 수 있습니다.';
        btn.disabled = true;

        try {
            const res = await fetch('/api/manual-documents/upload', { method: 'POST', body: formData });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `업로드 실패 (${res.status})`);
            }
            const data = await res.json();
            status.style.color = 'green';
            status.textContent = `✓ "${data.title}" 등록 완료 (${data.id})`;
            setTimeout(() => location.reload(), 1200);
        } catch (e) {
            status.style.color = 'red';
            status.textContent = '오류: ' + e.message;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
