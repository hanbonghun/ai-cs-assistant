spring:
  main:
    lazy-initialization: true
  mvc:
    hiddenmethod:
      filter:
        enabled: true

app:
  ai:
    provider: openai
    model: gpt-4.1-mini
    api-key: test-key
    embedding-model: text-embedding-3-small
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aicsassistant}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: none
