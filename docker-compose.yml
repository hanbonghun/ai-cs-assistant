services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cs-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: aicsassistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - cs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aicsassistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cs-postgres-data:
